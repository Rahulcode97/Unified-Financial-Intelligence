<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Finance Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/login.css">
</head>
<body class="login-atelier">
    <div class="login-atelier__glow" aria-hidden="true"></div>

    <div class="login-atelier__shell">
        <div class="login-atelier__card">
            <p class="login-atelier__back">
                <a href="index.html" class="login-atelier__back-link">← Back to Home</a>
            </p>
            <header class="login-atelier__brand">
                <p class="login-atelier__kicker">Sign In</p>
                <h1 class="login-atelier__title">GR Scholastic<span>Finance Portal</span></h1>
            </header>

            <p class="login-atelier__passkey-note">
                <strong>Passkey Sign-In</strong> — enter your work email, then use <em>Login with Passkey</em> to continue.
            </p>

            <div class="login-atelier__actions">
                <form id="passkeyForm" class="passkey-form" action="#" onsubmit="return false;" style="display:flex;flex-direction:column;gap:0;">
                    <div class="login-atelier__email-block">
                        <label class="login-atelier__field-label" for="passkeyEmail">Email</label>
                        <input type="email" id="passkeyEmail" name="username" class="login-atelier__input" autocomplete="username webauthn" autocapitalize="none" spellcheck="false" inputmode="email" placeholder="you@organization.com" value="analyst@grscholastic.in">
                        <p class="login-atelier__hint">Saved passkeys and accounts can show here when you focus or start typing (browser behavior).</p>
                    </div>
                    <button type="button" class="login-atelier__btn login-atelier__btn--primary" id="passkeyBtn" aria-label="Sign in with passkey">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M12 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
                            <path d="M6 10V8a6 6 0 0 1 12 0v2"/>
                            <path d="M8 14v2a4 4 0 0 0 8 0v-2"/>
                            <path d="M10 18v2"/><path d="M14 18v2"/>
                        </svg>
                        Login with Passkey
                    </button>
                </form>
                <a class="login-atelier__btn login-atelier__btn--google" href="dashboard.html" aria-label="Continue with Google">
                    <svg class="g-icon" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </a>
            </div>
            <p class="login-atelier__status" id="passkeyStatus" role="status" aria-live="polite"></p>
        </div>
    </div>

    <script>
    (function() {
        var btn = document.getElementById('passkeyBtn');
        var status = document.getElementById('passkeyStatus');
        var email = document.getElementById('passkeyEmail');
        btn.addEventListener('click', function() {
            if (!email.value.trim()) {
                status.textContent = 'Enter your email to use a passkey.';
                status.className = 'login-atelier__status login-atelier__status--err';
                email.focus();
                return;
            }
            btn.disabled = true;
            status.className = 'login-atelier__status';
            status.textContent = 'Requesting passkey from your device…';
            setTimeout(function() {
                status.textContent = 'Verifying with platform authenticator…';
            }, 600);
            setTimeout(function() {
                status.textContent = 'Signed in. Redirecting…';
                window.location.href = 'dashboard.html';
            }, 1500);
        });
    })();
    </script>
</body>
</html>
